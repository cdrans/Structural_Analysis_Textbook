# See docs at: https://mystmd.org/guide/frontmatter
version: 1
project:
  id: 7204695b-7485-4989-863c-16cf6e4db155
  title: Aircraft Structural Analysis and Design
  description: An interactive course reader for the TUDelft course "AE2135-I Aircraft Structural Analysis and Design"
  # keywords: []
  authors:
    - name: Calvin Rans
  license:
    content: CC-BY-4.0
  references:
    myst-guide: https://mystmd.org/guide
    jupyter: https://docs.jupyter.org/en/latest

  date: 2025-11-02 # ${BUILD_DATE} 
  github: https://github.com/cdrans/Structural_Analysis_Textbook # Change this URL to your GitHub repository
  edit_url: 
  
  plugins:
    - https://github.com/TUD-JB-Templates/JB2_plugins/releases/download/experiment/experiment.mjs
    - https://github.com/jupyter-book/myst-plugins/releases/download/page-last-updated/page-last-updated.mjs
  
  # exports and downloads
  exports:
    - format: typst
      template: lapreprint-typst
      output: exports/book.pdf
      id: output-pdf

  # Jupyter Notebook configuration
  jupyter:
    binder:
      repo: https://github.com/executablebooks/thebe-binder-base

  toc:
    - file: index.md                      # the landing page
    - file: content/Bending/00_bending.md
      sections:
      - file: content/Bending/01_sym_bending.md
      - file: content/Bending/02_bia_bending.md
      - file: content/Bending/03_unsym_bending.md


  abbreviations:
    FEM: Finite Element Method
  

    
site:
  template: book-theme
  options:
    favicon: ./content/figures/favicon.ico      # path to your favicon
    style: ./css/custom.css
    logo: ./content/figures/logo.svg          # path to your logo, shown top left at site
    folders: false
    hide_authors: true

  actions:
    - title: Feedback
      url: https://github.com/cdrans/Structural_Analysis_Textbook/issues
